<!doctype html>
<html lang="en" data-bs-theme="dark">
    <head>
        <title>Daily Savings Calculator</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>
        <main>
            <div class="container mt-5">
                <h1 class="text-center fw-bold">
                    How Much Should I Earn Every Day?
                </h1>
                <p class="text-center text-muted">
                    Calculate how much you need to earn daily to buy your
                    desired item within a specific timeframe.
                </p>
            </div>
            <div class="container-sm mt-5">
                <form onsubmit="calculateDailyEarnings(event)">
                    <div class="form-floating mb-3">
                        <input
                            type="text"
                            class="form-control rounded-4"
                            id="floatingItemName"
                            placeholder="Item Name"
                            required
                        />
                        <label for="floatingItemName"
                            >Item Name<span class="text-danger">*</span></label
                        >
                    </div>
                    <div class="form-floating mb-3">
                        <input
                            type="number"
                            class="form-control rounded-4"
                            id="floatingItemPrice"
                            placeholder="0.00"
                            step="0.01"
                            required
                        />
                        <label for="floatingItemPrice"
                            >Item Price (₱)<span class="text-danger"
                                >*</span
                            ></label
                        >
                    </div>
                    <div class="form-floating mb-3">
                        <input
                            type="number"
                            class="form-control rounded-4"
                            id="floatingCurrentSavings"
                            placeholder="0.00"
                            title="Please enter a number, leave blank if none :("
                            step="0.01"
                        />
                        <label for="floatingCurrentSavings"
                            >Current Savings (₱)</label
                        >
                    </div>
                    <div class="form-floating mb-3">
                        <input
                            type="number"
                            class="form-control rounded-4"
                            id="floatingItemDays"
                            placeholder="0"
                            step="1"
                            required
                        />
                        <label for="floatingItemDays"
                            >Number of Days<span class="text-danger"
                                >*</span
                            ></label
                        >
                    </div>
                    <button
                        type="submit"
                        class="fw-bold text-uppercase w-100 btn btn-success p-3 rounded-4"
                    >
                        Calculate
                    </button>
                    <button
                        type="reset"
                        class="fw-bold text-uppercase w-100 btn btn-outline-secondary p-3 rounded-4 mt-2"
                        onclick="clearResult()"
                    >
                        Reset
                    </button>
                </form>
                <div class="container-md text-center mt-4">
                    <p id="result" class="hidden-text"></p>
                    <p id="progressLabel" class="hidden-text">Progress:</p>
                    <div
                        class="progress hidden-text mb-3"
                        id="progressBar"
                        role="progressbar"
                        aria-label="Progress bar"
                        aria-valuenow="0"
                        aria-valuemin="0"
                        aria-valuemax="100"
                        style="height: 25px"
                    >
                        <div
                            class="progress-bar progress-bar-striped progress-bar-animated bg-success"
                        ></div>
                    </div>
                </div>
            </div>
        </main>
        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
        <script src="script.js"></script>
    </body>
</html>
